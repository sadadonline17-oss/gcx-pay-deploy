[build]
command = "npm run build"
publish = "dist"

[build.environment]
NODE_VERSION = "20.12.1"
NPM_FLAGS = "--legacy-peer-deps"

[[edge_functions]]
function = "dynamic-meta"
path = "/p/*"

[[edge_functions]]
function = "dynamic-meta"
path = "/pay/*"

[[edge_functions]]
function = "dynamic-meta"
path = "/recipient/*"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
